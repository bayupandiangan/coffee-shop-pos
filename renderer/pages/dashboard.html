<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Coffee POS</title>
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div class="app-container">
    <div id="sidebar"></div>
    <main class="content">
      <h1 class="page-title">Dashboard</h1>
      <div class="dashboard-cards" id="dashboardCards">
        <!-- Cards will be injected here -->
        <div class="card loading-card">
          <i class="fas fa-spinner fa-pulse"></i> Loading...
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { loadSidebar } from '../components/sidebar.js';
    import { showToast } from '../components/toast.js';
    import { showLoading, hideLoading } from '../components/loading.js';

    const user = await window.electronAPI.getCurrentUser();
    if (!user) {
      window.electronAPI.navigate('login');
    }

    const sidebar = loadSidebar(user.role);
    document.getElementById('sidebar').appendChild(sidebar);

    async function loadDashboardData() {
      showLoading();
      try {
        const salesData = await window.electronAPI.getSalesData('today');
        const container = document.getElementById('dashboardCards');
        container.innerHTML = `
          <div class="card dashboard-card">
            <div class="card-icon"><i class="fas fa-dollar-sign"></i></div>
            <div class="card-content">
              <h3>Today's Revenue</h3>
              <p class="card-number">Rp${salesData.totalRevenue.toLocaleString()}</p>
            </div>
          </div>
          <div class="card dashboard-card">
            <div class="card-icon"><i class="fas fa-receipt"></i></div>
            <div class="card-content">
              <h3>Transactions</h3>
              <p class="card-number">${salesData.transactionCount}</p>
            </div>
          </div>
          <div class="card dashboard-card">
            <div class="card-icon"><i class="fas fa-trophy"></i></div>
            <div class="card-content">
              <h3>Best Seller</h3>
              <p class="card-number">${salesData.bestProduct || '—'}</p>
            </div>
          </div>
        `;
      } catch (err) {
        showToast('Failed to load dashboard data', 'error');
      } finally {
        hideLoading();
      }
    }

    loadDashboardData();
  </script>
</body>
</html>
